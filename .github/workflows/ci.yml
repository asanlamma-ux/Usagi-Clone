name: CI/CD Pipeline

on:
  push:
    branches: [ main, devel, 'feature/**' ]
  pull_request:
    branches: [ main, devel ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint --stacktrace --debug

      - name: Upload Lint Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-results
          path: |
            app/build/reports/lint-results*
            app/build/intermediates/lint_intermediate_text_report/**/lint-results*.txt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace --debug

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

  build:
    runs-on: ubuntu-latest
    needs: [ lint, unit-test ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease --stacktrace --debug

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Build Native Libraries
        run: |
          set -euo pipefail
          if [ ! -f "app/src/main/cpp/CMakeLists.txt" ]; then
            echo "No native CMake project found"
            exit 0
          fi
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            build_dir="app/build/native-ci/${abi}"
            cmake \
              -S app/src/main/cpp \
              -B "${build_dir}" \
              -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${abi}" \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build "${build_dir}" --verbose
          done
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Usagi'
          path: '.'
          format: 'HTML'

      - name: Upload Security Report
        uses: actions/upload-artifact@v7
        with:
          name: security-report
          path: reports/
