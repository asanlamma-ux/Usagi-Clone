name: CI/CD Pipeline

on:
  push:
    branches: [ main, devel, 'feature/**' ]
  pull_request:
    branches: [ main, devel ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint --stacktrace

      - name: Upload Lint Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-results
          path: |
            app/build/reports/lint-results*
            app/build/intermediates/lint_intermediate_text_report/**/lint-results*.txt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/

  build:
    runs-on: ubuntu-latest
    needs: [ lint, unit-test ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Load MIYO build variables
        env:
          MIYO_VARIABLES: ${{ vars.MIYO }}
          APP_APPLICATION_ID: ${{ vars.APP_APPLICATION_ID }}
          APP_DISPLAY_NAME: ${{ vars.APP_DISPLAY_NAME }}
          APP_UPDATES_REPO: ${{ vars.APP_UPDATES_REPO }}
          APP_SOURCE_URL: ${{ vars.APP_SOURCE_URL }}
          APP_ICON_URL: ${{ vars.APP_ICON_URL }}
        run: |
          set -euo pipefail

          write_build_env() {
            case "$1" in
              APP_APPLICATION_ID|APP_DISPLAY_NAME|APP_UPDATES_REPO|APP_SOURCE_URL|APP_ICON_URL)
                if [ -n "$2" ]; then
                  printf '%s=%s\n' "$1" "$2" >> "${GITHUB_ENV}"
                fi
                ;;
            esac
          }

          if [ -n "${MIYO_VARIABLES:-}" ]; then
            while IFS='=' read -r key value || [ -n "${key:-}" ]; do
              key="${key%$'\r'}"
              value="${value%$'\r'}"
              case "$key" in
                ''|\#*) continue ;;
              esac
              write_build_env "$key" "$value"
            done <<< "${MIYO_VARIABLES}"
          fi

          write_build_env APP_APPLICATION_ID "${APP_APPLICATION_ID:-}"
          write_build_env APP_DISPLAY_NAME "${APP_DISPLAY_NAME:-}"
          write_build_env APP_UPDATES_REPO "${APP_UPDATES_REPO:-}"
          write_build_env APP_SOURCE_URL "${APP_SOURCE_URL:-}"
          write_build_env APP_ICON_URL "${APP_ICON_URL:-}"

      - name: Build Debug APK
        run: |
          set -euo pipefail
          APP_APPLICATION_ID="${APP_APPLICATION_ID:-org.koharu.miyo}"
          APP_DISPLAY_NAME="${APP_DISPLAY_NAME:-Miyo}"
          APP_UPDATES_REPO="${APP_UPDATES_REPO:-asanlamma-ux/MIYO}"
          APP_SOURCE_URL="${APP_SOURCE_URL:-https://github.com/${APP_UPDATES_REPO}}"
          APP_ICON_URL="${APP_ICON_URL:-https://raw.githubusercontent.com/${APP_UPDATES_REPO}/refs/heads/main/.github/assets/icon.png}"
          ./gradlew assembleDebug --stacktrace \
            -Papp.applicationId="${APP_APPLICATION_ID}" \
            -Papp.displayName="${APP_DISPLAY_NAME}" \
            -Papp.updatesRepo="${APP_UPDATES_REPO}" \
            -Papp.sourceUrl="${APP_SOURCE_URL}" \
            -Papp.iconUrl="${APP_ICON_URL}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode Release Keystore
        if: github.ref == 'refs/heads/main'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?ANDROID_RELEASE_KEYSTORE_BASE64 secret is missing}"
          mkdir -p "${RUNNER_TEMP}/keystore"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/keystore/miyo-release.p12"

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        env:
          APP_RELEASE_CERT_SHA256: ${{ secrets.APP_RELEASE_CERT_SHA256 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APP_RELEASE_CERT_SHA256:?APP_RELEASE_CERT_SHA256 secret is missing}"
          : "${ANDROID_RELEASE_KEYSTORE_PASSWORD:?ANDROID_RELEASE_KEYSTORE_PASSWORD secret is missing}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?ANDROID_RELEASE_KEY_ALIAS secret is missing}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?ANDROID_RELEASE_KEY_PASSWORD secret is missing}"
          APP_APPLICATION_ID="${APP_APPLICATION_ID:-org.koharu.miyo}"
          APP_DISPLAY_NAME="${APP_DISPLAY_NAME:-Miyo}"
          APP_UPDATES_REPO="${APP_UPDATES_REPO:-asanlamma-ux/MIYO}"
          APP_SOURCE_URL="${APP_SOURCE_URL:-https://github.com/${APP_UPDATES_REPO}}"
          APP_ICON_URL="${APP_ICON_URL:-https://raw.githubusercontent.com/${APP_UPDATES_REPO}/refs/heads/main/.github/assets/icon.png}"
          ./gradlew assembleRelease --stacktrace \
            -Papp.applicationId="${APP_APPLICATION_ID}" \
            -Papp.displayName="${APP_DISPLAY_NAME}" \
            -Papp.updatesRepo="${APP_UPDATES_REPO}" \
            -Papp.sourceUrl="${APP_SOURCE_URL}" \
            -Papp.iconUrl="${APP_ICON_URL}" \
            -Papp.releaseCertSha256="${APP_RELEASE_CERT_SHA256}" \
            -Prelease.storeFile="${RUNNER_TEMP}/keystore/miyo-release.p12" \
            -Prelease.storePassword="${ANDROID_RELEASE_KEYSTORE_PASSWORD}" \
            -Prelease.keyAlias="${ANDROID_RELEASE_KEY_ALIAS}" \
            -Prelease.keyPassword="${ANDROID_RELEASE_KEY_PASSWORD}"

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Build Native Libraries
        run: |
          set -euo pipefail
          if [ ! -f "app/src/main/cpp/CMakeLists.txt" ]; then
            echo "No native CMake project found"
            exit 0
          fi
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            build_dir="app/build/native-ci/${abi}"
            cmake \
              -S app/src/main/cpp \
              -B "${build_dir}" \
              -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${abi}" \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build "${build_dir}" --verbose
          done
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Usagi'
          path: '.'
          format: 'HTML'

      - name: Upload Security Report
        uses: actions/upload-artifact@v7
        with:
          name: security-report
          path: reports/
